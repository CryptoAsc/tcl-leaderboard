<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCL meets Low Priority - Leaderboard</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="container">
        <header>
            <h1 class="logo-text">TCL <span class="highlight">Meets</span> Low Priority</h1>
            <p class="subtitle">Escape the Trench. 5 Wins to Freedom.</p>
        </header>

        <main>
            <div class="escape-tracker-container" id="escape-tracker">
                <!-- Streak info injected here via JS -->
            </div>

            <div class="leaderboard-wrapper">
                <div class="list-headers">
                    <div class="col-rank">Rank</div>
                    <div class="col-player">Player</div>
                    <div class="col-streak">Streak</div>
                    <div class="col-stats">Score</div>
                    <div class="col-wl">W / L / Rate</div>
                </div>
                <div id="leaderboard-body" class="leaderboard-body">
                    <div class="loading">Fetching Low Priority Data...</div>
                </div>
            </div>
        </main>

        <footer>
            <p>Data updates automatically. <span id="last-updated">Last update: --</span></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>

</html>

name: Update Leaderboard Data

on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch:       # Allows manual triggering from the GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Fetch, update and push loop
        env:
          FACEIT_API_KEY: ${{ secrets.FACEIT_API_KEY }}
          FACEIT_SEASON_ID: ${{ vars.FACEIT_SEASON_ID || '28' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          for i in $(seq 1 19); do
            echo "--- Poll $i/19 ---"
            python scripts/fetch_data.py
            python scripts/discord_webhook.py
            
            git add docs/data/
            if ! git diff --quiet || ! git diff --staged --quiet; then
              echo "Changes detected, committing and pushing..."
              git commit -m "Auto-update leaderboard data"
              git pull --rebase origin main
              git push origin main
            fi
            
            if [ $i -lt 19 ]; then sleep 30; fi
          done
